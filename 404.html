
<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Page List</title>
</head>
<body> 
    <h1>Project Files</h1>
    <ul id="file-list">Loading files...</ul>

    <script>
        const username = location.hostname.match(/(.+)\.github\.io/)[1];
        const repo = location.href.match(/https?:\/\/.+?\/([^/]+)/)[1];
        const folderPath = location.pathname.match(/\/[^\/]+\/(.+)/)[1]; // Change this to your folder name
        const listElement = document.getElementById('file-list');

        async function getFiles() {
            try {
                // Notice the folderPath added to the end of the URL
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`);
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    listElement.innerHTML = '<li>Error: Folder not found or empty.</li>';
                    return;
                }

                listElement.innerHTML = ''; // Clear loading text

                data.forEach(file => {
                    // Only show files ending in .html
                    if (file.name.endsWith('.html')) {
                        const li = document.createElement('li');
                        
                        // IMPORTANT: The link must include the folder path
                        const fileNameClean = file.name.replace('.html', '');
                        li.innerHTML = `<a href="${file.name}">${fileNameClean}</a>`;
                        
                        listElement.appendChild(li);
                    }
                });
            } catch (error) {
                console.error("Error fetching files:", error);
                listElement.innerHTML = '<li>Error loading files.</li>';
            }
        }

        getFiles();
    </script>
</body>
</html>
